<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Login • Sistema Interno
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body class="login-body">

    <div class="login-background"></div>

    <div class="login-container">

        <div class="login-box">

            <div class="login-topo">

                <img
                    src="{{ url_for('static', filename='img/logo.png') }}"
                    class="logo-tc"
                    alt="TC Telecom"
                >

                <h1>
                    Sistema Interno
                </h1>

                <p class="subtitulo-login">
                    Helpdesk & Inventário
                </p>

            </div>

            {% if erro %}

            <div id="erro-login" class="erro-login">

                {{ erro }}

            </div>

            {% endif %}

            <form method="POST">

                <div class="campo">

                    <label>
                        Usuário
                    </label>

                    <input
                        type="text"
                        name="nome"
                        placeholder="Digite seu usuário"
                        required
                    >

                </div>

                <div class="campo">

                    <label>
                        Senha
                    </label>

                    <input
                        type="password"
                        name="senha"
                        placeholder="Digite sua senha"
                        required
                    >

                </div>

                <button class="btn-login">
                    Entrar
                </button>

            </form>

            <div class="login-footer">

                <span>
                    Sistema interno • TC Telecom
                </span>

            </div>

        </div>

    </div>

</body>

</html>
